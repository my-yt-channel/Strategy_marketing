<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Oatly Campaign</title>

  <style>
    @font-face {
      font-family: "GirdoBlack";
      src: url("fonts/GirdoBlackPro-Regular.a40bd0fc.woff") format("woff");
    }

    @font-face {
      font-family: "FKGrotesk";
      src: url("fonts/FKGroteskNeue.woff2") format("woff2");
    }

    body {
      margin: 0;
      font-family: "FKGrotesk", Arial, sans-serif;
      background: #EFECE6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      max-width: 500px;
      padding: 40px;
    }

    h1 {
      font-family: "GirdoBlack", Arial, sans-serif;
      font-size: 48px;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }
    .accent {
      display: block;
      width: 140px;
      height: auto;
      margin: 20px auto 40px auto;
    }

    .subtitle {
      font-size: 18px;
      margin-bottom: 40px;
      color: #333;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    a {
      text-decoration: none;
    }

    .btn {
      padding: 16px;
      font-size: 18px;
      border: 2px solid black;
      background: transparent;
      font-family: "GirdoBlack", Arial, sans-serif;
      cursor: pointer;
      transition: 0.2s;
      letter-spacing: 1px;
    }

    .btn:hover {
      background: black;
      color: #EFECE6;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>OATLY CAMPAIGN</h1>
    <img src="png/Pink_line.png" alt="" class="accent">

    <div class="subtitle">
      A series of provocative concepts exploring how we think about milk.
    </div>

    <div class="buttons">
      <a href="indexes/Ad_01.html"><div class="btn">POSTER</div></a>
      <a href="indexes/Ad_02.html"><div class="btn">Video AD Part1</div></a>
      <a href="indexes/Ad_03.html"><div class="btn">VIDEO AD Part2</div></a>
      <a href="indexes/Ad_04.html"><div class="btn">GRAFFITI</div></a>
    </div>
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oatly Ad 04</title>

  <style>
    @font-face {
      font-family: "GirdoBlack";
      src: url("../fonts/GirdoBlackPro-Regular.a40bd0fc.woff") format("woff");
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #dcd8d0;
    }

    .wall {
      width: 1200px;
      max-width: 95vw;
      min-height: 700px;
      background: #f4f0e8;
      border: 3px solid #000;
      position: relative;
      box-sizing: border-box;
      overflow: hidden;
      padding: 60px 70px 80px 70px;
    }

    .accent {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 20px;
      background: #7fb5d6;
    }

    .graffiti {
      margin-top: 35px;
      font-family: "GirdoBlack", Arial, sans-serif;
      font-size: 112px;
      line-height: 0.88;
      text-transform: uppercase;
      color: #000;
      max-width: 760px;
      transform: rotate(-1.5deg);
      letter-spacing: 0.5px;
    }

    .line {
      display: block;
      margin-bottom: 6px;
      position: relative;
    }

    .scribble {
      position: absolute;
      right: 70px;
      bottom: 110px;
      font-family: Arial, sans-serif;
      font-size: 22px;
      color: #000;
      transform: rotate(-8deg);
      opacity: 0.75;
    }

    .scribble::before {
      content: "";
      position: absolute;
      left: -12px;
      right: -12px;
      top: 50%;
      height: 2px;
      background: #000;
      transform: rotate(-8deg);
    }

    .back-button {
      position: fixed;
      bottom: 20px;
      left: 25px;
      font-family: "GirdoBlack", Arial, sans-serif;
      font-size: 22px;
      text-decoration: none;
      color: black;
      border: 2px solid black;
      padding: 8px 16px;
      background: #efece6;
    }

    .back-button:hover {
      background: black;
      color: #efece6;
    }

    @media (max-width: 950px) {
      .wall {
        padding: 50px 35px 80px 35px;
      }

      .graffiti {
        font-size: 70px;
        max-width: 100%;
      }

      .scribble {
        right: 35px;
        bottom: 95px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="wall">
    <div class="accent"></div>

    <div class="graffiti">
      <span class="line">THIS ONLY</span>
      <span class="line">MAKES SENSE</span>
      <span class="line">UNTIL YOU</span>
      <span class="line">THINK</span>
      <span class="line">ABOUT IT.</span>
    </div>

    <div class="scribble">kind of weird, no?</div>
  </div>

  <a href="../index.html" class="back-button">BACK</a>
</body>
</html>

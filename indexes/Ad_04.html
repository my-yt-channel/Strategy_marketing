<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Oatly Grafitti Ad</title>
  <link rel="stylesheet" href="../css/ad-style.css">

  <style>
    @font-face {
      font-family: "GirdoBlack";
      src: url("../fonts/GirdoBlackPro-Regular.a40bd0fc.woff") format("woff");
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #dcd8d0;
    }

    .wall {
      width: 1200px;
      max-width: 95vw;
      min-height: 700px;
      background: #f4f0e8;
      border: 3px solid #000;
      position: relative;
      padding: 80px 70px 100px 70px;
      box-sizing: border-box;
      overflow: hidden;
    }

    .accent {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 20px;
      background: #7fb5d6;
    }

    .graffiti {
      margin-top: 50px;
      font-family: "GirdoBlack", Arial, sans-serif;
      font-size: 92px;
      line-height: 0.95;
      text-transform: uppercase;
      color: #000;
      transform: rotate(-1.5deg);
      letter-spacing: 0.5px;
      max-width: 1050px;
    }

    .line {
      display: block;
      margin-bottom: 18px;
    }

    .line:nth-child(2) {
      margin-left: 40px;
    }

    .oatly-tag {
      position: absolute;
      right: 70px;
      bottom: 55px;
      width: 150px;
      height: auto;
      transform: rotate(-6deg);
      opacity: 0.95;
    }

    .back-button {
      position: fixed;
      bottom: 20px;
      left: 25px;
      font-family: "GirdoBlack", Arial, sans-serif;
      font-size: 22px;
      text-decoration: none;
      color: black;
      border: 2px solid black;
      padding: 8px 16px;
      background: #efece6;
      transition: 0.2s;
    }

    .back-button:hover {
      background: black;
      color: #efece6;
    }

    @media (max-width: 950px) {
      .wall {
        padding: 60px 35px 100px 35px;
      }

      .graffiti {
        font-size: 52px;
        max-width: 100%;
      }

      .line:nth-child(2) {
        margin-left: 15px;
      }

      
    }
  </style>
</head>

<body>
  <div class="wall">
    <div class="accent"></div>

    <div class="graffiti">
      <span class="line">THIS ONLY MAKES SENSE</span>
      <span class="line">UNTIL YOU THINK ABOUT IT.</span>
    </div>
  </div>

  <a href="../index.html" class="back-button">BACK</a>
</body>
</html>

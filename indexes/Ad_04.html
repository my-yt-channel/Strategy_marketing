<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oatly Ad 04</title>

  <style>
    @font-face {
      font-family: "GirdoBlack";
      src: url("../fonts/GirdoBlackPro-Regular.a40bd0fc.woff") format("woff");
    }

    @font-face {
      font-family: "FKGrotesk";
      src: url("../fonts/FKGroteskNeue.woff2") format("woff2");
    }

    @font-face {
      font-family: "Margo";
      src: url("../fonts/MargoPro-Regular.adcdb6c7.woff") format("woff");
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111;
      font-family: "FKGrotesk", Arial, sans-serif;
    }

    .poster {
      width: 1200px;
      max-width: 95vw;
      min-height: 700px;
      background: #f3efe7;
      border: 3px solid #000;
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
      padding: 70px 70px 90px 70px;
    }

    .poster::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 25%, rgba(0,0,0,0.05) 0 2px, transparent 3px),
        radial-gradient(circle at 75% 70%, rgba(0,0,0,0.04) 0 2px, transparent 3px),
        linear-gradient(rgba(0,0,0,0.015), rgba(0,0,0,0.015));
      background-size: 180px 180px, 220px 220px, 100% 100%;
      pointer-events: none;
    }

    .accent {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 22px;
      background: #7fb5d6;
      z-index: 2;
    }

    .content {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      gap: 30px;
      align-items: center;
      min-height: 540px;
    }

    .left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-right: 20px;
    }

    .tag {
      font-family: "Margo", "FKGrotesk", Arial, sans-serif;
      font-size: 20px;
      letter-spacing: 1px;
      margin-bottom: 25px;
      transform: rotate(-2deg);
      display: inline-block;
    }

    .headline {
      font-family: "GirdoBlack", "FKGrotesk", Arial, sans-serif;
      font-size: 86px;
      line-height: 0.92;
      text-transform: uppercase;
      margin: 0;
      letter-spacing: 0.5px;
    }

    .underline {
      width: 180px;
      height: 8px;
      background: #000;
      margin: 28px 0 0 8px;
      transform: rotate(-1.5deg);
    }

    .right {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .thought-box {
      width: 100%;
      max-width: 470px;
      border: 3px solid #000;
      background: rgba(255, 255, 255, 0.55);
      padding: 34px 30px 30px 30px;
      transform: rotate(2.3deg);
      box-shadow: 10px 10px 0 #000;
    }

    .thought-box p {
      margin: 0;
      font-family: "Margo", "FKGrotesk", Arial, sans-serif;
      font-size: 34px;
      line-height: 1.2;
    }

    .stamp {
      position: absolute;
      right: 10px;
      bottom: 10px;
      font-family: "GirdoBlack", Arial, sans-serif;
      font-size: 22px;
      transform: rotate(-7deg);
      border: 3px solid #000;
      padding: 10px 14px 6px 14px;
      background: #7fb5d6;
    }

    .back-button {
      position: fixed;
      bottom: 20px;
      left: 25px;
      font-family: "GirdoBlack", Arial, sans-serif;
      font-size: 22px;
      text-decoration: none;
      color: black;
      border: 2px solid black;
      padding: 8px 16px;
      background: #efece6;
      cursor: pointer;
      transition: 0.2s;
    }

    .back-button:hover {
      background: black;
      color: #efece6;
    }

    @media (max-width: 950px) {
      .poster {
        padding: 70px 35px 90px 35px;
      }

      .content {
        grid-template-columns: 1fr;
        gap: 25px;
      }

      .headline {
        font-size: 58px;
      }

      .thought-box {
        max-width: 100%;
        transform: rotate(1deg);
      }

      .thought-box p {
        font-size: 28px;
      }

      .stamp {
        position: static;
        margin-top: 20px;
        display: inline-block;
      }
    }
  </style>
</head>
<body>
  <div class="poster">
    <div class="accent"></div>

    <div class="content">
      <div class="left">
        <div class="tag">Maybe that’s the problem.</div>

        <h1 class="headline">
          THIS ONLY<br>
          MAKES SENSE<br>
          UNTIL YOU<br>
          THINK ABOUT IT.
        </h1>

        <div class="underline"></div>
      </div>

      <div class="right">
        <div class="thought-box">
          <p>
            Some ideas feel obvious<br>
            right up until the moment<br>
            you actually look at them.
          </p>
        </div>

        <div class="stamp">THINK AGAIN</div>
      </div>
    </div>
  </div>

  <a href="../index.html" class="back-button">BACK</a>
</body>
</html>

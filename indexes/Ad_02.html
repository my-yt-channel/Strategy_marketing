<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oatly Ad 02</title>

  <style>
    @font-face {
      font-family: "GirdoBlack";
      src: url("../fonts/GirdoBlackPro-Regular.a40bd0fc.woff") format("woff");
    }

    @font-face {
      font-family: "FKGrotesk";
      src: url("../fonts/FKGroteskNeue.woff2") format("woff2");
    }

    @font-face {
      font-family: "Margo";
      src: url("../fonts/MargoPro-Regular.adcdb6c7.woff") format("woff");
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #efece6;
      font-family: "FKGrotesk", Arial, sans-serif;
    }

    .poster {
      width: 1200px;
      max-width: 95vw;
      min-height: 700px;
      background: #efece6;
      border: 3px solid #000;
      box-sizing: border-box;
      position: relative;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
    }

    .accent {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 22px;
      background: #7fb5d6;
    }

    .left {
      padding: 80px 60px 60px 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .headline {
      font-family: "GirdoBlack", "FKGrotesk", Arial, sans-serif;
      font-size: 102px;
      line-height: 0.88;
      text-transform: uppercase;
      margin: 20px 0 30px 0;
      max-width: 620px;
    }

    .underline {
      width: 150px;
      height: 7px;
      background: #7fb5d6;
      margin: 0 0 28px 0;
    }

    .subtext {
      font-family: "Margo", "FKGrotesk", Arial, sans-serif;
      font-size: 36px;
      line-height: 1.2;
      max-width: 520px;
      margin: 0;
      letter-spacing: 0.3px;
      margin-bottom: 20px;
    }
    .right {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

.bottle {
  width: 100%;
  max-width: 420px;
  transform: translateX(20px);
}

    @media (max-width: 950px) {
      .poster {
        grid-template-columns: 1fr;
      }

      .headline {
        font-size: 74px;
        max-width: 100%;
      }

      .subtext {
        font-size: 30px;
      }

      .right {
        padding: 10px 40px 60px 40px;
      }

      .visual-word {
        font-size: 100px;
      }
    }
    .back-button {
      position: fixed;
      bottom: 20px;
      left: 25px;

      font-family: "GirdoBlack", Arial, sans-serif;
      font-size: 22px;

      text-decoration: none;
      color: black;

      border: 2px solid black;
      padding: 8px 16px;
      background: #efece6;

      cursor: pointer;
      transition: 0.2s;
    }

    .back-button:hover {
      background: black;
      color: #efece6;
    }
  </style>
</head>
<body>
  <div class="poster">
    <div class="accent"></div>

    <div class="left">
      <h1 class="headline">THIS IS NOT<br>NORMAL MILK</h1>

      <div class="underline"></div>

      <p class="subtext">
        That’s kind of the point.
      </p>
    </div>

    <div class="right">
      <img src="../png/bottle.PNG" alt="Milk bottle" class="bottle">
    </div>
  </div>
  <a href="../index.html" class="back-button">BACK</a>
</body>
</html>
